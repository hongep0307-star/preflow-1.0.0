  <body>
    <div id="root"></div>
    <script>
      // 윈도우 컨트롤 오버레이 / 드래그 영역 padding 을 OS 별로 다르게 주기 위한
      // 플랫폼 클래스. CSS 에서 .platform-mac .app-topbar 로 분기한다.
      (function () {
        try {
          var ua = navigator.userAgent || "";
          var p = /Mac/i.test(ua) ? "mac" : /Win/i.test(ua) ? "win" : /Linux/i.test(ua) ? "linux" : "other";
          document.documentElement.classList.add("platform-" + p);
        } catch (_) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
